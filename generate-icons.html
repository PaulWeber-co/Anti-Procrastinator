<!DOCTYPE html>
<html>
<head><title>Generate Icons</title></head>
<body>
<h3>Anti Procrastinator — Icon Generator</h3>
<p>Rechtsklick auf jedes Icon → "Bild speichern unter" → in den <code>icons/</code> Ordner speichern.</p>
<div style="display:flex;gap:20px;align-items:end;margin:20px 0;">
  <div>
    <canvas id="c16" width="16" height="16"></canvas>
    <p>icon16.png</p>
  </div>
  <div>
    <canvas id="c48" width="48" height="48"></canvas>
    <p>icon48.png</p>
  </div>
  <div>
    <canvas id="c128" width="128" height="128"></canvas>
    <p>icon128.png</p>
  </div>
</div>
<p id="status">Generating...</p>
<script>
function draw(id, size) {
  const c = document.getElementById(id);
  const ctx = c.getContext('2d');

  // Background
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, size, size);

  // Border
  const b = Math.max(1, Math.round(size * 0.04));
  ctx.strokeStyle = '#e8e8e8';
  ctx.lineWidth = b;
  ctx.strokeRect(b/2, b/2, size - b, size - b);

  // "AP" text
  const fontSize = Math.round(size * 0.38);
  ctx.fillStyle = '#e8e8e8';
  ctx.font = `bold ${fontSize}px monospace`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('AP', size / 2, size / 2 + 1);

  // Dot top-right
  const dotR = Math.max(1.5, Math.round(size * 0.045));
  ctx.beginPath();
  ctx.arc(size - b * 4, b * 4, dotR, 0, Math.PI * 2);
  ctx.fillStyle = '#e8e8e8';
  ctx.fill();

  return c;
}

draw('c16', 16);
draw('c48', 48);
draw('c128', 128);

// Auto-download
function downloadCanvas(id, size) {
  const c = document.getElementById(id);
  const link = document.createElement('a');
  link.download = 'icon' + size + '.png';
  link.href = c.toDataURL('image/png');
  link.click();
}

// Download all with slight delay
setTimeout(() => downloadCanvas('c16', 16), 100);
setTimeout(() => downloadCanvas('c48', 48), 300);
setTimeout(() => downloadCanvas('c128', 128), 500);
setTimeout(() => { document.getElementById('status').textContent = 'Done! Check your downloads folder and move files to icons/'; }, 700);
</script>
</body>
</html>
