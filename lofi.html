<!DOCTYPE html>
<html lang="de">
<head><title>Lofi Player</title><style>body{margin:0;overflow:hidden;}iframe{border:0;}</style></head>
<body>
<iframe
  id="yt"
  width="1"
  height="1"
  src=""
  allow="autoplay; encrypted-media"
  style="position:absolute;top:0;left:0;">
</iframe>
<script>
  // Nachrichten vom Parent empfangen
  window.addEventListener('message', function(e) {
    var iframe = document.getElementById('yt');
    if (e.data === 'play') {
      iframe.src = 'https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=1&mute=0&enablejsapi=0';
    } else if (e.data === 'stop') {
      iframe.src = '';
    }
  });
</script>
</body>
</html>
